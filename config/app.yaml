server:
  port: 8080
  maxConnections: 200

pipeline:
  gridSpacingMeters: 500
  batchSize: 5000
  geoBatchSize: 1500
  tileZoomMin: 6
  tileZoomMax: 12
  scoringWeights:
    base:
      forest: 0.40
      altitude: 0.25
      soil: 0.20
      aspect: 0.15
    weather:
      rain14d: 0.40
      rainTrigger: 0.20
      temperature: 0.40
    humidityMultiplierMin: 0.15
  weather:
    baseURL: "https://archive-api.open-meteo.com/v1/archive"
    maxConcurrentRequests: 2
    retryMaxAttempts: 10
    retryBaseDelayMs: 2000
    cacheTTLSeconds: 86400
    rateLimitPerSecond: 5
    rateLimitBurst: 2
    # Coarse grid step in degrees. Each unique cell = 1 Open-Meteo request.
    # Historical: ~10km (0.09°) — full precision for current-day maps.
    # Forecast:   ~20km (0.18°) — halves API usage for 5-day outlook tiles.
    weatherStepHistorical: 0.09
    weatherStepForecast: 0.18

map:
  tileSignedUrlTtlSeconds: 3600
  tileRetentionDays: 90
  freeMaxZoom: 9
  proMaxZoom: 12

s3:
  tileBucket: funghi-map-tiles
  region: eu-south-1
  uploadBatchSize: 50

subscription:
  checkoutSuccessURL: "https://funghimap.it/checkout/success"
  checkoutCancelURL: "https://funghimap.it/checkout/cancel"
  stripePriceIDs:
    pro: "price_PLACEHOLDER_SET_IN_ENV"
  plans:
    free:
      maxZoom: 9
      historyDays: 0
      features: []
      maxPOIs: 1
    pro:
      maxZoom: 12
      historyDays: 90
      features:
        - "hd_tiles"
        - "historical_data"
        - "forecast_notifications"
      maxPOIs: 10
