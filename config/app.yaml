server:
  port: 8080
  maxConnections: 200

pipeline:
  gridSpacingMeters: 500
  batchSize: 5000
  tileZoomMin: 6
  tileZoomMax: 12
  scoringWeights:
    forest: 0.30
    rain14d: 0.25
    temperature: 0.20
    altitude: 0.15
    soil: 0.10
  weather:
    baseURL: "https://archive-api.open-meteo.com/v1/archive"
    maxConcurrentRequests: 50
    retryMaxAttempts: 3
    retryBaseDelayMs: 500
    cacheTTLSeconds: 86400

map:
  tileSignedUrlTtlSeconds: 3600
  tileRetentionDays: 90
  freeMaxZoom: 9
  proMaxZoom: 12

s3:
  tileBucket: funghi-map-tiles
  region: eu-south-1
  uploadBatchSize: 50
