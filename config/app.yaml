server:
  port: 8080
  maxConnections: 200

pipeline:
  gridSpacingMeters: 500
  batchSize: 5000
  tileZoomMin: 6
  tileZoomMax: 12
  scoringWeights:
    base:
      forest: 0.40
      altitude: 0.25
      soil: 0.20
      aspect: 0.15
    weather:
      rain14d: 0.55
      temperature: 0.45
    humidityMultiplierMin: 0.4
  weather:
    baseURL: "https://archive-api.open-meteo.com/v1/archive"
    maxConcurrentRequests: 10
    retryMaxAttempts: 5
    retryBaseDelayMs: 500
    cacheTTLSeconds: 86400

map:
  tileSignedUrlTtlSeconds: 3600
  tileRetentionDays: 90
  freeMaxZoom: 9
  proMaxZoom: 12

s3:
  tileBucket: funghi-map-tiles
  region: eu-south-1
  uploadBatchSize: 50

subscription:
  checkoutSuccessURL: "https://funghimap.it/checkout/success"
  checkoutCancelURL: "https://funghimap.it/checkout/cancel"
  stripePriceIDs:
    pro: "price_PLACEHOLDER_SET_IN_ENV"
  plans:
    free:
      maxZoom: 9
      historyDays: 0
      features: []
    pro:
      maxZoom: 12
      historyDays: 90
      features:
        - "hd_tiles"
        - "historical_data"
