# Funz Beta — nginx reverse proxy
# Symlinked into /usr/local/etc/nginx/servers/ (Intel Mac)
# Usage: ln -sf $(pwd)/infra/nginx/funghimap-beta.conf /usr/local/etc/nginx/servers/

# Tile cache — 200 MB on disk, up to 7-day retention.
# SECURITY NOTE (beta only): cache key is URI without auth query param, so a cached
# tile response is served without re-checking the token. Safe for beta (single-user).
# In production, replace this with CloudFront signed URLs instead.
proxy_cache_path /var/cache/nginx/tile_cache
    levels=1:2
    keys_zone=tile_cache:10m
    max_size=200m
    inactive=7d
    use_temp_path=off;

# Upstream — Vapor app running in Docker, bound to 127.0.0.1:8080
upstream funz_beta {
    server 127.0.0.1:8080;
    keepalive 16;
}

# HTTP — redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name funz1.duckdns.org;

    # Certbot ACME challenge (must stay on port 80)
    location /.well-known/acme-challenge/ {
        root /usr/local/var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to Vapor container
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name funz1.duckdns.org;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/funz1.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/funz1.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (comment out if testing)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Max upload size (for user photos)
    client_max_body_size 10m;

    # Proxy to Vapor
    location / {
        proxy_pass http://funz_beta;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering off;
    }

    # Pre-rendered static tiles — immutable per date, cache for 7 days.
    # (beta: key is path only, token stripped — safe for single-user beta)
    location ~* ^/map/(tiles|forecast-tiles)/ {
        proxy_pass http://funz_beta;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tile_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;

        add_header X-Tile-Cache $upstream_cache_status;
    }

    # Dynamic tiles vary by min_score query param — include full URI+args in key, short TTL.
    location ~* ^/map/dynamic-tiles/ {
        proxy_pass http://funz_beta;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tile_cache;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 204 1m;
        proxy_cache_valid 404 2m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;

        add_header X-Tile-Cache $upstream_cache_status;
    }

    # Health check — no logging
    location = /health {
        proxy_pass http://funz_beta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block common scanners
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|wp-admin|wp-login) {
        return 444;
    }
}
