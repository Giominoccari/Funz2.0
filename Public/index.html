<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funghi Map — Tile Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        let currentDate = new Date().toISOString().slice(0, 10);
        let currentOpacity = 0.7;

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                    }
                },
                layers: [{
                    id: 'osm-layer',
                    type: 'raster',
                    source: 'osm',
                    minzoom: 0,
                    maxzoom: 19
                }]
            },
            center: [11.12, 46.07],
            zoom: 8,
            minZoom: 6,
            maxZoom: 12
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        function loadOverlay(date) {
            const sourceId = 'funghi-tiles';
            const layerId = 'funghi-layer';

            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            currentDate = date;

            map.addSource(sourceId, {
                type: 'raster',
                tiles: [`/map/tiles/${date}/{z}/{x}/{y}`],
                tileSize: 256,
                minzoom: 6,
                maxzoom: 12
            });

            map.addLayer({
                id: layerId,
                type: 'raster',
                source: sourceId,
                paint: {
                    'raster-opacity': currentOpacity
                }
            });
        }

        function setOpacity(value) {
            currentOpacity = Math.max(0, Math.min(1, value));
            if (map.getLayer('funghi-layer')) {
                map.setPaintProperty('funghi-layer', 'raster-opacity', currentOpacity);
            }
        }

        map.on('load', () => {
            loadOverlay(currentDate);
        });
    </script>
</body>
</html>
