<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funghi Map — Tile Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #controls {
            position: absolute; top: 12px; left: 12px; z-index: 1;
            background: rgba(255, 255, 255, 0.92); border-radius: 8px;
            padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 14px; min-width: 220px;
        }
        #controls h3 { margin-bottom: 10px; font-size: 15px; }
        .control-row { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .control-row label { min-width: 60px; }
        .control-row input[type="date"] { flex: 1; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; }
        .control-row input[type="range"] { flex: 1; }
        #opacity-value { min-width: 32px; text-align: right; }
        #status { margin-top: 6px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="controls">
        <h3>Funghi Map Viewer</h3>
        <div class="control-row">
            <label for="date-input">Data:</label>
            <input type="date" id="date-input">
        </div>
        <div class="control-row">
            <label for="opacity-slider">Opacit&agrave;:</label>
            <input type="range" id="opacity-slider" min="0" max="100" value="70">
            <span id="opacity-value">70%</span>
        </div>
        <div id="status">Caricamento...</div>
    </div>

    <script>
        const today = new Date().toISOString().slice(0, 10);
        const dateInput = document.getElementById('date-input');
        const opacitySlider = document.getElementById('opacity-slider');
        const opacityValue = document.getElementById('opacity-value');
        const status = document.getElementById('status');

        dateInput.value = today;

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                    }
                },
                layers: [{
                    id: 'osm-layer',
                    type: 'raster',
                    source: 'osm',
                    minzoom: 0,
                    maxzoom: 19
                }]
            },
            center: [11.12, 46.07],
            zoom: 8,
            minZoom: 6,
            maxZoom: 12
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        function getTileUrl(date) {
            return `/map/tiles/${date}/{z}/{x}/{y}`;
        }

        function loadOverlay(date) {
            const sourceId = 'funghi-tiles';
            const layerId = 'funghi-layer';

            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            map.addSource(sourceId, {
                type: 'raster',
                tiles: [getTileUrl(date)],
                tileSize: 256,
                minzoom: 6,
                maxzoom: 12
            });

            map.addLayer({
                id: layerId,
                type: 'raster',
                source: sourceId,
                paint: {
                    'raster-opacity': opacitySlider.value / 100
                }
            });

            status.textContent = `Tile overlay: ${date}`;
        }

        map.on('load', () => {
            loadOverlay(dateInput.value);
        });

        dateInput.addEventListener('change', () => {
            loadOverlay(dateInput.value);
        });

        opacitySlider.addEventListener('input', () => {
            const val = opacitySlider.value;
            opacityValue.textContent = val + '%';
            if (map.getLayer('funghi-layer')) {
                map.setPaintProperty('funghi-layer', 'raster-opacity', val / 100);
            }
        });
    </script>
</body>
</html>
