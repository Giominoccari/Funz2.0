<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Funghi Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* ── User location marker ── */
        .user-marker-wrapper {
            position: relative;
            width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
            isolation: isolate;
        }
        .user-marker-ring {
            position: absolute;
            width: 46px; height: 46px; border-radius: 50%;
            background: radial-gradient(circle, rgba(46,204,113,.28) 0%, rgba(46,204,113,0) 70%);
            transform-origin: center center;
            will-change: transform, opacity;
            animation: user-ring-pulse 2.5s ease-out infinite;
        }
        /* Profile photo avatar */
        .user-marker-photo {
            position: relative; z-index: 1;
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,.45);
            object-fit: cover;
            display: none; /* shown once image loads */
        }
        /* Fallback green dot (shown when no avatar) */
        .user-marker-dot {
            position: relative; z-index: 1;
            width: 16px; height: 16px; border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,.35);
        }
        .user-marker-arrow {
            position: absolute; z-index: 2;
            top: -2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 6px solid #fff;
            filter: drop-shadow(0 -1px 2px rgba(0,0,0,.2));
            display: none; /* shown when heading is available */
        }
        @keyframes user-ring-pulse {
            0%   { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* ── POI markers ── */
        .poi-marker {
            display: flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50% 50% 50% 3px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: 2px solid #fff;
            box-shadow: 0 1px 5px rgba(0,0,0,.3), 0 0 0 1px rgba(0,0,0,.06);
            transform: rotate(-45deg);
            cursor: pointer;
            transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
        }
        .poi-marker:hover {
            transform: rotate(-45deg) scale(1.15);
            box-shadow: 0 3px 10px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.08);
        }
        .poi-marker-inner {
            transform: rotate(45deg);
            font-size: 10px; line-height: 1; color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,.3);
        }

        /* ── POI label ── */
        .poi-label {
            position: absolute; top: 26px; left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px; font-weight: 600; color: #fff;
            background: rgba(30,30,30,.82);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            padding: 2px 7px; border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,.25);
            pointer-events: none;
            opacity: 0; transition: opacity .2s ease;
        }
        .poi-wrapper:hover .poi-label { opacity: 1; }
        .poi-wrapper {
            position: relative; display: flex;
            align-items: center; justify-content: center;
        }

        /* ── Track start / end markers ── */
        .track-endpoint {
            width: 16px; height: 16px; border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,.45);
        }
        .track-start { background: #34C759; }
        .track-end {
            background: #FF375F;
            box-shadow: 0 2px 8px rgba(0,0,0,.45), 0 0 0 5px rgba(255,55,95,.25);
            animation: track-pulse 1.8s ease-out infinite;
        }
        @keyframes track-pulse {
            0%   { box-shadow: 0 2px 8px rgba(0,0,0,.45), 0 0 0 0   rgba(255,55,95,.5); }
            70%  { box-shadow: 0 2px 8px rgba(0,0,0,.45), 0 0 0 10px rgba(255,55,95,0); }
            100% { box-shadow: 0 2px 8px rgba(0,0,0,.45), 0 0 0 0   rgba(255,55,95,0); }
        }

        /* ── Center crosshair ── */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        .crosshair-dot {
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,.85);
            box-shadow: 0 0 0 1px rgba(0,0,0,.2), inset 0 0 0 1px rgba(0,0,0,.15);
        }

        /* ── Maplibre popup overrides ── */
        .maplibregl-popup-content {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px; font-weight: 500;
            padding: 6px 10px; border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.18);
        }
        .maplibregl-popup-tip { border-top-color: #fff; }

        /* ── Hide MapLibre logo / attribution ── */
        .maplibregl-ctrl-bottom-right,
        .maplibregl-ctrl-bottom-left { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- Center crosshair -->
    <div id="crosshair">
        <div class="crosshair-dot"></div>
    </div>
    <script>
        // ── Parse query parameters from the URL ──
        const params = new URLSearchParams(window.location.search);
        const initLat = parseFloat(params.get('lat')) || 46.07;
        const initLon = parseFloat(params.get('lon')) || 11.12;
        const initZoom = parseInt(params.get('zoom'), 10) || 8;
        let authToken = params.get('token') || '';

        let currentDate = params.get('date') || new Date().toISOString().slice(0, 10);
        let currentOpacity = 1;
        let heatThreshold = 0;
        let heatShowAll = false;
        let currentMode = 'historical'; // 'historical' | 'forecast'
        let currentForecastDate = null;

        // ── Tile URL builder ──
        // score=0  → static pre-rendered tiles (served from disk/nginx, ~instant)
        // score>0  → dynamic tiles computed from raster with threshold filter
        // No token → dev-tiles (local only, unauthenticated)
        function tileURLTemplate(date, score) {
            const s = (typeof score === 'number') ? score : 0;
            // if (!authToken) 
            return `/map/dev-tiles/${date}/{z}/{x}/{y}`;
            // if (s > 0) {
            //     return `/map/dynamic-tiles/${date}/{z}/{x}/{y}?min_score=${s.toFixed(2)}&token=${encodeURIComponent(authToken)}`;
            // }
            // return `/map/tiles/${date}/{z}/{x}/{y}?token=${encodeURIComponent(authToken)}`;
        }

        // ── Map initialization ──
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'esri-satellite': {
                        type: 'raster',
                        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256,
                        maxzoom: 18,
                        attribution: '&copy; Esri, Maxar, Earthstar Geographics'
                    },
                    'osm-labels': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        maxzoom: 19,
                        attribution: '&copy; OpenStreetMap contributors'
                    }
                },
                layers: [
                    {
                        id: 'esri-satellite-layer',
                        type: 'raster',
                        source: 'esri-satellite',
                        minzoom: 0,
                        maxzoom: 18
                    },
                    {
                        id: 'osm-labels-layer',
                        type: 'raster',
                        source: 'osm-labels',
                        minzoom: 0,
                        maxzoom: 19,
                        paint: { 'raster-opacity': 0.4 }
                    }
                ]
            },
            center: [initLon, initLat],
            zoom: initZoom,
            minZoom: 6,
            maxZoom: 12,
            maxBounds: [[5.5, 35.5], [20.0, 48.0]]
        });

        // ── Funghi overlay ──
        function loadOverlay(date, minScore) {
            const sourceId = 'funghi-tiles';
            const layerId = 'funghi-layer';

            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            currentDate = date;
            currentMode = 'historical';
            currentForecastDate = null;

            nativeLog('loadOverlay date=' + date + ' score=' + minScore + ' hasToken=' + !!authToken);

            // If called without explicit score (e.g. from native bridge on date switch),
            // preserve the current JS threshold so the filter is not silently dropped.
            const score = (minScore !== undefined) ? minScore : (heatShowAll ? 0 : heatThreshold / 100);

            map.addSource(sourceId, {
                type: 'raster',
                tiles: [tileURLTemplate(date, score)],
                tileSize: 256,
                minzoom: 6,
                maxzoom: 12
            });

            map.addLayer({
                id: layerId,
                type: 'raster',
                source: sourceId,
                paint: { 'raster-opacity': currentOpacity }
            });
        }

        function setOpacity(value) {
            currentOpacity = Math.max(0, Math.min(1, value));
            if (map.getLayer('funghi-layer')) {
                map.setPaintProperty('funghi-layer', 'raster-opacity', currentOpacity);
            }
        }

        // ── POI markers ──
        const poiMarkers = [];

        function clearPOIs() {
            poiMarkers.forEach(m => m.remove());
            poiMarkers.length = 0;
        }

        function renderPOIs(pois) {
            clearPOIs();
            if (!Array.isArray(pois)) return;
            pois.forEach(poi => {
                const wrapper = document.createElement('div');
                wrapper.className = 'poi-wrapper';

                const pin = document.createElement('div');
                pin.className = 'poi-marker';
                const inner = document.createElement('div');
                inner.className = 'poi-marker-inner';
                inner.textContent = '\u{1F344}';
                pin.appendChild(inner);
                wrapper.appendChild(pin);

                if (poi.name) {
                    const label = document.createElement('div');
                    label.className = 'poi-label';
                    label.textContent = poi.name;
                    wrapper.appendChild(label);
                }

                // anchor: 'bottom' pins the layout box bottom to the coordinate.
                // The rotated diamond's visual tip extends 11*(√2-1) ≈ 4.6px below the
                // layout box, so we compensate with a negative Y offset so the tip
                // hits the exact coordinate at every zoom level.
                const marker = new maplibregl.Marker({ element: wrapper, anchor: 'bottom', offset: [0, -5] })
                    .setLngLat([poi.lon, poi.lat])
                    .addTo(map);

                if (poi.name) {
                    marker.setPopup(
                        new maplibregl.Popup({ offset: 14, closeButton: false })
                            .setText(poi.name)
                    );
                }
                poiMarkers.push(marker);
            });
        }

        // ── User location marker ──
        let userMarker = null;

        function buildUserMarkerElement() {
            const wrapper = document.createElement('div');
            wrapper.className = 'user-marker-wrapper';

            const ring = document.createElement('div');
            ring.className = 'user-marker-ring';

            const photo = document.createElement('img');
            photo.className = 'user-marker-photo';
            // Cache-bust so a fresh avatar is loaded after profile edits
            photo.src = 'funz://user/avatar.png?t=' + Date.now();
            photo.onload = function() {
                photo.style.display = 'block';
                dot.style.display = 'none';
            };
            photo.onerror = function() {
                photo.style.display = 'none';
                dot.style.display = 'block';
            };

            const dot = document.createElement('div');
            dot.className = 'user-marker-dot';
            // dot visible by default until photo confirms load
            dot.style.display = 'block';

            wrapper.appendChild(ring);
            wrapper.appendChild(photo);
            wrapper.appendChild(dot);
            return wrapper;
        }

        function setUserLocation(lat, lon) {
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: buildUserMarkerElement() })
                    .setLngLat([lon, lat]).addTo(map);
            } else {
                userMarker.setLngLat([lon, lat]);
            }
        }

        // Reload the avatar photo after a profile photo change (called from Swift)
        window.refreshUserMarker = function() {
            if (!userMarker) return;
            const el = userMarker.getElement();
            const photo = el.querySelector('.user-marker-photo');
            const dot = el.querySelector('.user-marker-dot');
            if (!photo || !dot) return;
            photo.src = 'funz://user/avatar.png?t=' + Date.now();
            photo.onload = function() { photo.style.display = 'block'; dot.style.display = 'none'; };
            photo.onerror = function() { photo.style.display = 'none'; dot.style.display = 'block'; };
        };

        // Lightweight update — moves marker without flyTo (for continuous GPS updates)
        window.updateUserMarker = function(lat, lon) {
            if (typeof lat !== 'number' || typeof lon !== 'number') return;
            setUserLocation(lat, lon);
        };

        // ── Live track polyline ──
        let trackStartMarker = null;
        let trackEndMarker = null;

        function renderTrack(coords) {
            const lineCoords = coords.map(c => [c.lon, c.lat]);
            const geojson = {
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: lineCoords }
            };

            if (map.getSource('live-track')) {
                map.getSource('live-track').setData(geojson);
            } else {
                map.addSource('live-track', { type: 'geojson', data: geojson });

                // White casing for contrast on satellite imagery
                map.addLayer({
                    id: 'live-track-casing',
                    type: 'line',
                    source: 'live-track',
                    layout: { 'line-cap': 'round', 'line-join': 'round' },
                    paint: {
                        'line-color': '#ffffff',
                        'line-width': 6,
                        'line-opacity': 0.9
                    }
                });

                // Vibrant core line
                map.addLayer({
                    id: 'live-track-line',
                    type: 'line',
                    source: 'live-track',
                    layout: { 'line-cap': 'round', 'line-join': 'round' },
                    paint: {
                        'line-color': '#FF375F',
                        'line-width': 3.5,
                        'line-opacity': 1
                    }
                });
            }

            // Start / end markers
            if (lineCoords.length >= 2) {
                const startCoord = lineCoords[0];
                const endCoord = lineCoords[lineCoords.length - 1];

                if (!trackStartMarker) {
                    const sEl = document.createElement('div');
                    sEl.className = 'track-endpoint track-start';
                    trackStartMarker = new maplibregl.Marker({ element: sEl })
                        .setLngLat(startCoord).addTo(map);
                }

                if (!trackEndMarker) {
                    const eEl = document.createElement('div');
                    eEl.className = 'track-endpoint track-end';
                    trackEndMarker = new maplibregl.Marker({ element: eEl })
                        .setLngLat(endCoord).addTo(map);
                } else {
                    trackEndMarker.setLngLat(endCoord);
                }

                // Auto-zoom to street level when tracking starts (first few points)
                if (lineCoords.length <= 3 && map.getZoom() < 15) {
                    map.flyTo({ center: endCoord, zoom: 16, duration: 1200 });
                } else {
                    // Auto-pan to keep current position visible during live tracking
                    const bounds = map.getBounds();
                    if (!bounds.contains(endCoord)) {
                        map.easeTo({ center: endCoord, duration: 800 });
                    }
                }
            }
        }

        // ── Clear live track (called when outing ends) ──
        function clearTrack() {
            ['live-track-line', 'live-track-casing'].forEach(id => {
                if (map.getLayer(id)) map.removeLayer(id);
            });
            if (map.getSource('live-track')) map.removeSource('live-track');
            if (trackStartMarker) { trackStartMarker.remove(); trackStartMarker = null; }
            if (trackEndMarker)   { trackEndMarker.remove();   trackEndMarker = null; }
        }

        window.clearTrack = clearTrack;

        // ── Send map center coordinates to native app ──
        let moveEndTimer = null;
        function sendCenterToNative() {
            const center = map.getCenter();
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.coordinateHandler) {
                window.webkit.messageHandlers.coordinateHandler.postMessage({
                    lat: center.lat,
                    lon: center.lng,
                    value: 0
                });
            }
        }

        // Debounced: update on pan/zoom end
        map.on('moveend', () => {
            clearTimeout(moveEndTimer);
            moveEndTimer = setTimeout(sendCenterToNative, 300);
        });

        // Also on click (snap center to tapped point)
        map.on('click', (e) => {
            map.flyTo({ center: [e.lngLat.lng, e.lngLat.lat], duration: 400 });
        });

        // Recenter map to user position (called from native)
        let lastUserLat = null, lastUserLon = null;
        const _origSetUserLocation = setUserLocation;
        setUserLocation = function(lat, lon) {
            lastUserLat = lat;
            lastUserLon = lon;
            _origSetUserLocation(lat, lon);
        };

        window.recenterToUser = function() {
            if (lastUserLat != null && lastUserLon != null) {
                map.flyTo({ center: [lastUserLon, lastUserLat], duration: 800 });
            }
        };

        // ── Bridge: Native → Web functions ──

        // Called by MapBridge.pushLocation(_:)
        window.onNativeLocation = function(wloc) {
            if (wloc && typeof wloc.latitude === 'number' && typeof wloc.longitude === 'number') {
                setUserLocation(wloc.latitude, wloc.longitude);
                map.flyTo({ center: [wloc.longitude, wloc.latitude], duration: 800 });
            }
        };

        // Called by MapBridge.pushLiveTrack(_:)
        window.onNativeTrack = function(coords) {
            if (Array.isArray(coords) && coords.length > 0) {
                renderTrack(coords);
            }
        };

        // Called by MapBridge.setHeatOptions(threshold:allPoints:)
        window.setHeatOptions = function(opts) {
            if (!opts) return;
            if (typeof opts.threshold === 'number') heatThreshold = opts.threshold;
            if (typeof opts.all === 'boolean') heatShowAll = opts.all;

            // Forecast tiles are pre-rendered static PNGs — threshold does not apply.
            // Keep the forecast overlay as-is when the user adjusts the slider.
            if (currentMode === 'forecast') return;

            // Convert threshold (0-100) to score (0.0-1.0) and reload tiles
            const minScore = heatShowAll ? 0 : heatThreshold / 100;
            loadOverlay(currentDate, minScore);
        };

        // Called by MapBridge.pushPOIs(_:) via window.postMessage
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || typeof data !== 'object') return;

            if (data.type === 'poi.set' && Array.isArray(data.pois)) {
                renderPOIs(data.pois);
            }
        });

        // Selective debug logging — do NOT intercept console.log globally.
        // MapLibre logs heavily during tile loading; each postMessage is a synchronous
        // IPC call to the UI process. Forwarding all logs floods the IPC channel and
        // causes WebContent to become unresponsive on iOS 26.
        window.nativeLog = function(msg) {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.jsLogger) {
                window.webkit.messageHandlers.jsLogger.postMessage(String(msg));
            }
        };

        // Called by native after token refresh — updates token and reloads tiles with correct date
        window.setMapAuth = function(token, date) {
            if (token) authToken = token;
            if (date) loadOverlay(date);
        };

        // Token-only update: refresh the auth token without reloading tiles.
        // Used when returning from background so iOS can decide which overlay to reload.
        window.updateAuthToken = function(token) {
            if (token) authToken = token;
        };

        // ── Forecast overlay ──
        // Called by MapBridge.loadForecastDate(_:) — switches to forecast tile layer

        function forecastTileURLTemplate(date) {
            if (authToken) {
                return `/map/forecast-tiles/${date}/{z}/{x}/{y}?token=${encodeURIComponent(authToken)}`;
            }
            return `/map/forecast-tiles/${date}/{z}/{x}/{y}`;
        }

        window.loadForecastOverlay = function(date) {
            if (!date) return;
            currentMode = 'forecast';
            currentForecastDate = date;

            const sourceId = 'funghi-tiles';
            const layerId = 'funghi-layer';

            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            map.addSource(sourceId, {
                type: 'raster',
                tiles: [forecastTileURLTemplate(date)],
                tileSize: 256,
                minzoom: 6,
                maxzoom: 12
            });

            map.addLayer({
                id: layerId,
                type: 'raster',
                source: sourceId,
                paint: { 'raster-opacity': currentOpacity }
            });
        };

        // ── FlyTo (notification deep link) ──
        // Called by MapBridge.flyTo(latitude:longitude:zoom:)
        window.flyTo = function(lat, lon, zoom) {
            if (typeof lat !== 'number' || typeof lon !== 'number') return;
            map.flyTo({
                center: [lon, lat],
                zoom: typeof zoom === 'number' ? zoom : 11,
                duration: 1200
            });
        };

        // ── Init ──
        map.on('load', () => {
            loadOverlay(currentDate);
            nativeLog('map.load date=' + currentDate + ' hasToken=' + !!authToken);
        });

        let _tileLoadFailCount = 0;
        map.on('error', (e) => {
            const err = e.error;
            const msg = err ? (err.message || err.status || String(err)) : 'unknown';
            const src = e.sourceId || (e.tile ? String(e.tile.tileID) : '');
            nativeLog('map.error src=' + src + ' msg=' + msg);

            // "Load failed" means WebContent networking proxy is broken (iOS 26 didBecomeUnresponsive).
            // window.location.reload() reuses the same broken process — we need Swift to
            // destroy+recreate the WKWebView entirely (new process, fresh networking stack).
            if (msg === 'Load failed') {
                _tileLoadFailCount++;
                if (_tileLoadFailCount === 3) {
                    nativeLog('networking broken — requesting new WebContent process');
                    try { webkit.messageHandlers.networkingBroken.postMessage(null); } catch(e) {}
                }
            }
        });

        // Patch setMapAuth to also log
        const _origSetMapAuth = window.setMapAuth;
        window.setMapAuth = function(token, date) {
            nativeLog('setMapAuth called date=' + date + ' hasToken=' + !!token + ' mapLoaded=' + map.loaded());
            _origSetMapAuth(token, date);
        };
    </script>
</body>
</html>
