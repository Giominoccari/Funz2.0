services:
  postgres:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    container_name: funghimap-postgres
    environment:
      POSTGRES_USER: funghimap
      POSTGRES_PASSWORD: funghimap_dev
      POSTGRES_DB: funghimap_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funghimap -d funghimap_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: funghimap-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
